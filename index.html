<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0a0f1f" />
    <meta
      name="description"
      content="Paste a messy list and watch a 7 MB in-browser model group and label it into a live semantic map. Zero data leaves your tab."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Gistmap: a private semantic map for messy lists" />
    <meta
      property="og:description"
      content="Paste a messy list and watch a 7 MB in-browser model group and label it into a live semantic map. Zero data leaves your tab."
    />
    <!-- Brass four-point star favicon, inline so there is no default globe. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a0f1f'/%3E%3Cpath d='M16 4 L18 14 L28 16 L18 18 L16 28 L14 18 L4 16 L14 14 Z' fill='%23e7b24c'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=Space+Mono&display=swap"
      rel="stylesheet"
    />
    <title>Gistmap: a private semantic map for messy lists</title>
  </head>
  <body>
    <div id="app"></div>
    <noscript>
      <p style="color: #f0ead9; font-family: system-ui, sans-serif; padding: 24px">
        Gistmap runs entirely in your browser and needs JavaScript enabled to map your
        lists on-device. Please enable JavaScript and reload.
      </p>
    </noscript>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
